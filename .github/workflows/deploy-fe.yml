name: Deploy FE

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-fe.yml"
      - "apps/web/**"
      - "packages/**"
      - "tooling/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".nvmrc"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-fe.yml"
      - "apps/web/**"
      - "packages/**"
      - "tooling/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".nvmrc"

concurrency:
  group: deploy-fe-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.21.0"
  PNPM_VERSION: "10.19.0"
  APP_PACKAGE: "@acme/web" # CHANGE ME if the workspace package name changes.
  APP_PATH: "apps/web" # CHANGE ME if the frontend app path changes.
  IMAGE_NAME: "${{ secrets.DOCKER_USERNAME }}/asemis-fe" # CHANGE ME if the Docker Hub repository name changes.
  CONTAINER_NAME: "asemis-web" # CHANGE ME if the container name on the VPS changes.
  APP_DOMAIN: "aofvualamvuahoc.sgt.vn" # CHANGE ME if the public domain changes.
  HOST_PORT: "3003" # CHANGE ME if Nginx/VPS should expose another host port.
  CONTAINER_PORT: "3003" # CHANGE ME only if the app listens on a different port.
  REMOTE_ENV_FILE: "/root/asemis/env/web.env" # CHANGE ME if the env file path on VPS is different.
  CANARY_PORT: "3004" # CHANGE ME if 3004 is already used on the VPS.

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web app and its dependency graph
        run: pnpm turbo run typecheck --filter=${{ env.APP_PACKAGE }}

      - name: Build web app and required workspace packages
        run: pnpm turbo run build --filter=${{ env.APP_PACKAGE }}

  deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=asemis-fe
          cache-to: type=gha,mode=max,scope=asemis-fe

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_DOMAIN: ${{ env.APP_DOMAIN }}
          HOST_PORT: ${{ env.HOST_PORT }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          REMOTE_ENV_FILE: ${{ env.REMOTE_ENV_FILE }}
          CANARY_PORT: ${{ env.CANARY_PORT }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME,APP_DOMAIN,HOST_PORT,CONTAINER_PORT,REMOTE_ENV_FILE,CANARY_PORT,DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -Eeuo pipefail

            CANARY_NAME="${CONTAINER_NAME}-canary"
            PREVIOUS_NAME="${CONTAINER_NAME}-previous"
            HAD_PREVIOUS=0

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on the VPS."
              exit 1
            fi

            if [ ! -f "${REMOTE_ENV_FILE}" ]; then
              echo "Missing env file: ${REMOTE_ENV_FILE}"
              exit 1
            fi

            echo "Deploying ${APP_DOMAIN} on host port ${HOST_PORT} -> container port ${CONTAINER_PORT}"

            echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
            docker pull "${IMAGE_NAME}:${IMAGE_TAG}"

            docker rm -f "${CANARY_NAME}" >/dev/null 2>&1 || true

            docker run -d \
              --name "${CANARY_NAME}" \
              --env-file "${REMOTE_ENV_FILE}" \
              -p "127.0.0.1:${CANARY_PORT}:${CONTAINER_PORT}" \
              "${IMAGE_NAME}:${IMAGE_TAG}"

            for _ in $(seq 1 30); do
              status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${CANARY_NAME}")"

              if [ "${status}" = "healthy" ]; then
                break
              fi

              if [ "${status}" = "unhealthy" ] || [ "${status}" = "exited" ]; then
                docker logs "${CANARY_NAME}" || true
                docker rm -f "${CANARY_NAME}" >/dev/null 2>&1 || true
                exit 1
              fi

              sleep 2
            done

            canary_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${CANARY_NAME}")"
            if [ "${canary_status}" != "healthy" ]; then
              docker logs "${CANARY_NAME}" || true
              docker rm -f "${CANARY_NAME}" >/dev/null 2>&1 || true
              exit 1
            fi

            docker rm -f "${PREVIOUS_NAME}" >/dev/null 2>&1 || true

            if docker ps -a --format '{{.Names}}' | grep -Fxq "${CONTAINER_NAME}"; then
              HAD_PREVIOUS=1
              docker stop "${CONTAINER_NAME}" >/dev/null 2>&1 || true
              docker rename "${CONTAINER_NAME}" "${PREVIOUS_NAME}"
            fi

            if ! docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --env-file "${REMOTE_ENV_FILE}" \
              -p "${HOST_PORT}:${CONTAINER_PORT}" \
              "${IMAGE_NAME}:${IMAGE_TAG}"; then
              docker rm -f "${CANARY_NAME}" >/dev/null 2>&1 || true

              if [ "${HAD_PREVIOUS}" -eq 1 ]; then
                docker rename "${PREVIOUS_NAME}" "${CONTAINER_NAME}"
                docker start "${CONTAINER_NAME}"
              fi

              exit 1
            fi

            docker rm -f "${CANARY_NAME}" >/dev/null 2>&1 || true

            for _ in $(seq 1 30); do
              status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${CONTAINER_NAME}")"

              if [ "${status}" = "healthy" ]; then
                break
              fi

              if [ "${status}" = "unhealthy" ] || [ "${status}" = "exited" ]; then
                docker logs "${CONTAINER_NAME}" || true
                docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true

                if [ "${HAD_PREVIOUS}" -eq 1 ]; then
                  docker rename "${PREVIOUS_NAME}" "${CONTAINER_NAME}"
                  docker start "${CONTAINER_NAME}"
                fi

                exit 1
              fi

              sleep 2
            done

            final_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${CONTAINER_NAME}")"
            if [ "${final_status}" != "healthy" ]; then
              docker logs "${CONTAINER_NAME}" || true
              docker rm -f "${CONTAINER_NAME}" >/dev/null 2>&1 || true

              if [ "${HAD_PREVIOUS}" -eq 1 ]; then
                docker rename "${PREVIOUS_NAME}" "${CONTAINER_NAME}"
                docker start "${CONTAINER_NAME}"
              fi

              exit 1
            fi

            docker rm -f "${PREVIOUS_NAME}" >/dev/null 2>&1 || true
            docker image prune -af --filter "until=168h" >/dev/null 2>&1 || true

            echo "Deployment completed for https://${APP_DOMAIN}"
